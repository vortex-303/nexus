app = "nexus-workspace"
primary_region = "ewr"

[build]

[env]
  DATA_DIR = "/data"

[mounts]
  source = "nexus_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[services]]
  internal_port = 2525
  protocol = "tcp"
  [[services.ports]]
    port = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
