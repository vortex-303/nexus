version: 2

before:
  hooks:
    - npm --prefix web ci
    - npm --prefix web run build

builds:
  - id: nexus
    main: ./cmd/nexus/
    binary: nexus
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    tags:
      - sqlite_fts5
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=zig-cc-x86_64
      - goos: linux
        goarch: arm64
        env:
          - CC=zig-cc-aarch64

archives:
  - id: nexus
    format: tar.gz
    name_template: "nexus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: vortex-303
    name: nexus
  draft: false
  prerelease: auto
